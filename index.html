          {

            opzioni: [

          {

        // Logica Applicazione
        const app = {
            currentMode: 'database',
            session: {
                mode: null, // 'quiz' oppure 'simulatore'
                activeQuestions: [],
                currentIndex: 0,
                userAnswers: {}, // Mappa ID_Domanda -> IndiceOpzioneSelezionata
                timeRemaining: 3600
            },
            timerInterval: null,
            
            // Inizializza l'interfaccia
            init() {
                // Gestione menu mobile
                document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                    document.getElementById('sidebar').classList.remove('-translate-x-full');

                document.getElementById('close-menu-btn').addEventListener('click', () => {
                    document.getElementById('sidebar').classList.add('-translate-x-full');
                });

                this.switchView('database');
            },

            // Gestore Navigazione Views
            switchView(view) {
                this.currentMode = view;
                
                // Aggiorna UI Sidebar
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('text-ph-accent', 'border-ph-accent', 'bg-ph-panel');
                    btn.classList.add('text-gray-400', 'border-transparent');
                });
                const activeBtn = document.getElementById(`nav-${view}`);
                if(activeBtn) {
                    activeBtn.classList.remove('text-gray-400', 'border-transparent');
                    activeBtn.classList.add('text-ph-accent', 'border-ph-accent', 'bg-ph-panel');
                }

                // Chiudi sidebar su mobile
                if(window.innerWidth < 768) {
                    document.getElementById('sidebar').classList.add('-translate-x-full');
                }

                const container = document.getElementById('content-container');
                container.innerHTML = '';

                if (domandeDatabase.length === 0) {
                    this.renderEmptyState(container);
                    return;
                }

                if (view === 'database') {
                    this.stopTimer(); // Ferma il timer se si naviga via
                    this.renderDatabase(container);
                } else if (view === 'quiz' || view === 'simulatore') {
                    // Controlla se c'è una sessione in corso
                    if (this.session.mode !== null) {
                        if (this.session.mode === view) {
                            // Riprendi sessione corrente
                            this.renderQuestionEngine(container, view === 'simulatore' ? 'Simulatore Esame' : 'Quiz Continuo', view === 'simulatore');
                            if (view === 'simulatore' && this.session.timeRemaining > 0) this.startTimer();
                        } else {
                            // Sta cercando di cambiare modalità mentre un'altra è attiva: forza azzeramento
                            this.stopTimer();
                            this.renderResumeOrReset(container, view);
                        }
                    } else {
                        // Nessuna sessione, ne avvia una nuova
                        this.startNewSession(view);
                    }
                }
            },

            renderEmptyState(container) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-center">

                        <h2 class="text-2xl font-bold text-white mb-2">Nessuna domanda trovata</h2>
                        <p class="text-gray-400 max-w-md">Il database è attualmente vuoto. Per favore, popola l'array <code class="text-ph-accent">domandeDatabase</code> nel codice sorgente per iniziare a utilizzare Solfa Hub.</p>

            },

            // === SEZIONE: CONSULTA DATABASE ===
            renderDatabase(container) {
                let html = `
                    <div class="mb-8">
                        <h1 class="text-3xl font-bold text-white mb-2">Consulta Database</h1>
                        <p class="text-gray-400">Archivio completo di tutte le ${domandeDatabase.length} domande con le relative risposte corrette. Le prime 30 sono relative all'intermedia.</p>
                    </div>

                `;

                domandeDatabase.forEach((q, index) => {
                    html += `
                        <div class="bg-ph-panel border border-ph-border rounded-lg p-6 hover:border-gray-600 transition-colors">
                            <h3 class="text-lg font-semibold text-white mb-4"><span class="text-ph-accent mr-2">#${index + 1}</span> ${q.domanda}</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    `;
                    q.opzioni.forEach((opt, optIndex) => {
                        const isCorrect = optIndex === q.corretta;
                        const styleClass = isCorrect ? 'bg-green-900/30 border-green-500 text-green-400' : 'bg-black/50 border-ph-border text-gray-400';
                        const checkIcon = isCorrect ? `<svg class="w-5 h-5 ml-auto text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>` : '';
                        
                        html += `
                            <div class="p-3 border rounded-md flex items-center ${styleClass}">
                                <span>${opt}</span>
                                ${checkIcon}
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                });

                html += `</div>`;
                container.innerHTML = html;
            },

            // === CORE FUNZIONI (Mescolamento e Avvio) ===
            prepareShuffledQuestions(sourceArray, limit = null) {
                let processed = sourceArray.map((q, idx) => ({ ...q, originalId: idx }));
                processed = processed.sort(() => Math.random() - 0.5);
                
                if (limit && limit < processed.length) {
                    processed = processed.slice(0, limit);
                }

                return processed.map(q => {
                    let optionsWithFlags = q.opzioni.map((opt, idx) => ({
                        testo: opt,
                        isCorrect: idx === q.corretta,
                        originalOptIndex: idx
                    }));
                    optionsWithFlags = optionsWithFlags.sort(() => Math.random() - 0.5);

                    return { ...q, shuffledOptions: optionsWithFlags };
                });
            },

            startNewSession(mode) {
                this.stopTimer();
                this.session.mode = mode;
                this.session.activeQuestions = this.prepareShuffledQuestions(domandeDatabase, mode === 'simulatore' ? 40 : null);
                this.session.currentIndex = 0;
                this.session.userAnswers = {};
                this.session.timeRemaining = 3600;

                const container = document.getElementById('content-container');
                this.renderQuestionEngine(container, mode === 'simulatore' ? 'Simulatore Esame' : 'Quiz Continuo', mode === 'simulatore');
                
                if (mode === 'simulatore') this.startTimer();
            },

            clearSessionAndRestart() {
                const mode = this.session.mode;
                this.session.mode = null;
                this.startNewSession(mode);
            },

            renderResumeOrReset(container, targetMode) {
                const currentName = this.session.mode === 'simulatore' ? 'Simulatore Esame' : 'Quiz Continuo';
                const targetName = targetMode === 'simulatore' ? 'Simulatore Esame' : 'Quiz Continuo';
                
                container.innerHTML = `
                    <div class="max-w-2xl mx-auto bg-ph-panel border border-red-500/50 rounded-xl p-8 mt-10 shadow-2xl">

                        <p class="text-gray-300 text-lg mb-8 leading-relaxed">
                            Hai attualmente un <strong>${currentName}</strong> in corso nei tuoi progressi. <br>
                            Prima di avviare un nuovo <strong>${targetName}</strong> rimescolando la banca dati, è necessario azzerare i progressi attuali.
                        </p>
                        
                        <div class="flex flex-col md:flex-row justify-center items-center gap-4">
                            <button onclick="app.switchView('${this.session.mode}')" class="px-6 py-3 rounded font-bold text-white bg-gray-700 hover:bg-gray-600 transition-colors w-full md:w-auto">
                                Riprendi ${currentName}
                            </button>
                            <button onclick="app.clearSessionAndRestartTarget('${targetMode}')" class="px-6 py-3 rounded font-bold text-white bg-red-600 hover:bg-red-500 transition-colors w-full md:w-auto flex items-center justify-center gap-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                Azzera tutto e avvia ${targetName}
                            </button>
                        </div>
                    </div>
                `;
            },

            clearSessionAndRestartTarget(targetMode) {
                this.session.mode = null;
                // Aggiorna anche il menù laterale
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('text-ph-accent', 'border-ph-accent', 'bg-ph-panel'));
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('text-gray-400', 'border-transparent'));
                const activeBtn = document.getElementById(`nav-${targetMode}`);
                if(activeBtn) {
                    activeBtn.classList.remove('text-gray-400', 'border-transparent');
                    activeBtn.classList.add('text-ph-accent', 'border-ph-accent', 'bg-ph-panel');
                }
                this.switchView(targetMode);
            },

            // === MOTORE DOMANDE E UI ===
            renderQuestionEngine(container, title, isSimulator = false) {
                const q = this.session.activeQuestions[this.session.currentIndex];
                const answered = this.session.userAnswers[q.originalId] !== undefined;
                
                // Contatori Corrette/Errate
                let correctCount = 0;
                let incorrectCount = 0;
                this.session.activeQuestions.forEach(question => {
                    const ans = this.session.userAnswers[question.originalId];
                    if (ans !== undefined) {
                        if (question.shuffledOptions[ans].isCorrect) correctCount++;
                        else incorrectCount++;
                    }
                });

                let headerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h1 class="text-2xl font-bold text-white">${title}</h1>
                            <p class="text-sm text-gray-400 mt-1">Domanda <span class="text-ph-accent font-bold">${this.session.currentIndex + 1}</span> di ${this.session.activeQuestions.length}</p>
                            <div class="flex gap-4 mt-3 text-sm font-semibold bg-black/50 inline-block px-3 py-1 rounded border border-ph-border">
                                <span class="text-green-500">Corrette: ${correctCount}</span>
                                <span class="text-gray-600">|</span>
                                <span class="text-red-500">Errate: ${incorrectCount}</span>
                            </div>
                        </div>
                `;

                if (isSimulator) {
                    headerHTML += `
                        <div class="bg-ph-panel border border-ph-border px-4 py-2 rounded-lg flex items-center gap-2">
                            <svg class="w-5 h-5 text-ph-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span id="timer-display" class="font-mono text-xl font-bold text-white">--:--</span>
                        </div>
                    `;
                }
                headerHTML += `</div>`;

                // Progress Bar
                const progressPercent = ((this.session.currentIndex + 1) / this.session.activeQuestions.length) * 100;
                headerHTML += `
                    <div class="w-full bg-ph-panel rounded-full h-1.5 mb-8">
                      <div class="bg-ph-accent h-1.5 rounded-full transition-all duration-300" style="width: ${progressPercent}%"></div>
                    </div>
                `;

                // Opzioni con Feedback Immediato
                let optionsHTML = `<div class="space-y-3 mt-6">`;
                q.shuffledOptions.forEach((opt, idx) => {
                    const isSelected = this.session.userAnswers[q.originalId] === idx;
                    
                    let bgClass = 'bg-black/40';
                    let borderClass = 'border-ph-border';
                    let textClass = 'text-gray-200';
                    let circleClass = 'border-gray-500 bg-transparent';

                    if (answered) {
                        if (opt.isCorrect) {
                            bgClass = 'bg-green-900/30';
                            borderClass = 'border-green-500';
                            textClass = 'text-green-400 font-bold';
                            circleClass = 'border-green-500 bg-green-500';
                        } else if (isSelected && !opt.isCorrect) {
                            bgClass = 'bg-red-900/30';
                            borderClass = 'border-red-500';
                            textClass = 'text-red-400';
                            circleClass = 'border-red-500 bg-red-500';
                        }
                    }

                    const clickHandler = !answered ? `onclick="app.selectOption(${idx})"` : '';
                    const cursorClass = answered ? 'cursor-default' : 'cursor-pointer hover:border-gray-500';

                    optionsHTML += `
                        <div class="relative block ${cursorClass} group" ${clickHandler}>
                            <div class="border ${borderClass} ${bgClass} rounded-lg p-4 transition-all flex items-center">
                                <div class="w-5 h-5 border-2 ${circleClass} rounded-full mr-4 flex-shrink-0 transition-colors"></div>
                                <span class="${textClass} text-lg">${opt.testo}</span>
                            </div>
                        </div>
                    `;
                });
                optionsHTML += `</div>`;

                let footerHTML = `<div class="mt-8 flex justify-between items-center pt-6 border-t border-ph-border">`;
                
                // Pulsante Indietro (per rivedere ma non modificare)
                if (this.session.currentIndex > 0) {
                    footerHTML += `
                        <button onclick="app.navigate(-1)" class="px-6 py-2 rounded font-semibold text-white bg-ph-panel border border-ph-border hover:bg-gray-800 transition-colors flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Indietro
                        </button>
                    `;
                } else {
                    footerHTML += `<div></div>`; // Spacer
                }

                // Pulsante Avanti / Vedi Statistiche
                if (this.session.currentIndex < this.session.activeQuestions.length - 1) {
                    if (answered) {
                        footerHTML += `
                            <button onclick="app.navigate(1)" class="px-6 py-2 rounded font-bold text-black bg-ph-accent hover:bg-ph-accentHover transition-colors flex items-center gap-2">
                                Avanti <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        `;
                    } else {
                        footerHTML += `
                            <button disabled class="px-6 py-2 rounded font-bold text-black bg-ph-accent/30 cursor-not-allowed flex items-center gap-2" title="Rispondi per proseguire">
                                Avanti <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        `;
                    }
                } else {
                    if (answered) {
                        footerHTML += `
                            <button onclick="app.submitSession()" class="px-6 py-2 rounded font-bold text-white bg-green-600 hover:bg-green-700 transition-colors flex items-center gap-2 shadow-lg shadow-green-900/50">
                                Vedi Statistiche
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                            </button>
                        `;
                    } else {
                        footerHTML += `
                            <button disabled class="px-6 py-2 rounded font-bold text-white bg-green-600/30 cursor-not-allowed flex items-center gap-2">
                                Vedi Statistiche
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                            </button>

                    }
                }
                footerHTML += `</div>`;

                container.innerHTML = `
                    <div class="max-w-3xl mx-auto">
                        ${headerHTML}
                        <div class="bg-ph-panel border border-ph-border rounded-xl p-6 md:p-8 shadow-xl">
                            <h2 class="text-xl md:text-2xl font-semibold text-white leading-relaxed">
                                ${q.domanda}
                            </h2>
                            ${optionsHTML}
                        </div>
                        ${footerHTML}
                    </div>
                `;

                if (isSimulator) this.updateTimerDisplay(); // Assicura che mostri i dati subito
            },

            // Gestione selezione risposta (Feedback Immediato)
            selectOption(shuffledOptIndex) {
                const q = this.session.activeQuestions[this.session.currentIndex];
                if (this.session.userAnswers[q.originalId] !== undefined) return; // Impedisce di cambiare risposta
                
                this.session.userAnswers[q.originalId] = shuffledOptIndex;
                
                // Ri-renderizza per mostrare i colori corretto/errato e sbloccare il tasto Avanti
                const container = document.getElementById('content-container');
                this.renderQuestionEngine(container, this.session.mode === 'simulatore' ? 'Simulatore Esame' : 'Quiz Continuo', this.session.mode === 'simulatore');
            },

            // Navigazione tra le domande
            navigate(direction) {
                const newIndex = this.session.currentIndex + direction;
                if (newIndex >= 0 && newIndex < this.session.activeQuestions.length) {
                    this.session.currentIndex = newIndex;
                    const container = document.getElementById('content-container');
                    this.renderQuestionEngine(container, this.session.mode === 'simulatore' ? 'Simulatore Esame' : 'Quiz Continuo', this.session.mode === 'simulatore');
                }
            },

            // === TIMER LOGICA ===
            startTimer() {
                this.updateTimerDisplay();
                this.timerInterval = setInterval(() => {
                    this.session.timeRemaining--;
                    this.updateTimerDisplay();
                    
                    if (this.session.timeRemaining <= 0) {
                        this.stopTimer();
                        alert("Tempo scaduto! L'esame verrà concluso automaticamente.");
                        this.submitSession();
                    }
                }, 1000);
            },

            stopTimer() {
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
            },

            updateTimerDisplay() {
                const display = document.getElementById('timer-display');
                if (!display) return;
                
                const m = Math.floor(this.session.timeRemaining / 60).toString().padStart(2, '0');
                const s = (this.session.timeRemaining % 60).toString().padStart(2, '0');
                display.textContent = `${m}:${s}`;

                if (this.session.timeRemaining < 300) { // Sotto 5 minuti, diventa rosso
                    display.classList.remove('text-white');
                    display.classList.add('text-red-500');
                }
            },

            // === RISULTATI E STATISTICHE ===
            submitSession() {
                this.stopTimer();
                const container = document.getElementById('content-container');
                
                let score = 0;
                let resultsHTML = `
                    <div class="mb-8 text-center">
                        <h1 class="text-4xl font-bold text-white mb-2">Statistiche ${this.session.mode === 'simulatore' ? 'Esame' : 'Quiz'}</h1>
                        <p class="text-gray-400">Ecco il riepilogo dettagliato della tua sessione.</p>
                    </div>
                    <div class="space-y-6 max-w-4xl mx-auto">
                `;

                this.session.activeQuestions.forEach((q, index) => {
                    const userAnswerIdx = this.session.userAnswers[q.originalId];
                    const hasAnswered = userAnswerIdx !== undefined;
                    let isCorrect = false;
                    let selectedOptObj = null;

                    if (hasAnswered) {
                        selectedOptObj = q.shuffledOptions[userAnswerIdx];
                        isCorrect = selectedOptObj.isCorrect;
                        if (isCorrect) score++;
                    }

                    const correctOptObj = q.shuffledOptions.find(o => o.isCorrect);
                    const borderClass = isCorrect ? 'border-green-500/50' : (hasAnswered ? 'border-red-500/50' : 'border-yellow-500/50');
                    const headerClass = isCorrect ? 'text-green-400' : (hasAnswered ? 'text-red-400' : 'text-yellow-400');
                    const statusText = isCorrect ? 'Corretta' : (hasAnswered ? 'Errata' : 'Non risposto');

                    resultsHTML += `
                        <div class="bg-ph-panel border ${borderClass} rounded-lg p-6">
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="text-lg font-semibold text-white pr-4"><span class="text-gray-500 mr-2">${index + 1}.</span>${q.domanda}</h3>
                                <span class="px-3 py-1 rounded text-xs font-bold bg-black/50 ${headerClass} whitespace-nowrap border ${borderClass}">${statusText}</span>
                            </div>
                            
                            <div class="space-y-2 mt-4">
                                <div class="p-3 rounded bg-black/40 border border-ph-border">
                                    <span class="text-xs text-gray-500 uppercase font-bold tracking-wider block mb-1">La tua risposta:</span>
                                    <span class="${isCorrect ? 'text-green-400' : 'text-red-400'}">${hasAnswered ? selectedOptObj.testo : 'Nessuna risposta'}</span>
                                </div>
                                
                                ${!isCorrect ? `
                                <div class="p-3 rounded bg-green-900/10 border border-green-900/50">
                                    <span class="text-xs text-green-600 uppercase font-bold tracking-wider block mb-1">Risposta corretta:</span>
                                    <span class="text-green-400">${correctOptObj.testo}</span>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });

                resultsHTML += `</div>`;
                
                const passed = score >= (this.session.activeQuestions.length * 0.6); 
                const scoreColor = passed ? 'text-green-400' : 'text-red-500';

                // Modificato: Ora il pulsante di riavvio forza esplicitamente l'azzeramento della sessione
                const scoreBoard = `
                    <div class="max-w-4xl mx-auto bg-black border border-ph-border rounded-xl p-8 mb-8 text-center shadow-2xl">
                        <h2 class="text-6xl font-black ${scoreColor} mb-2">${score} <span class="text-2xl text-gray-500">/ ${this.session.activeQuestions.length}</span></h2>
                        <p class="text-xl text-white mb-8">${passed ? 'Ottimo lavoro! Soglia superata.' : 'Soglia non raggiunta. Continua ad esercitarti.'}</p>
                        
                        <div class="flex flex-col md:flex-row justify-center items-center gap-4 border-t border-ph-border pt-8">
                            <p class="text-gray-400 text-sm md:w-1/2 text-left pr-4">Per ripetere il test con nuove domande mescolate casualmente dal database, è necessario azzerare i progressi di questa sessione.</p>
                            <button onclick="app.clearSessionAndRestart()" class="px-8 py-3 rounded font-bold text-black bg-ph-accent hover:bg-ph-accentHover transition-colors inline-flex items-center justify-center gap-2 flex-1 w-full">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                Azzera e Genera Nuovo Test
                            </button>
                        </div>
                    </div>
                `;

                container.innerHTML = scoreBoard + resultsHTML;
            }
        };

        // Avvio Applicazione al caricamento
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
</body>
</html>
